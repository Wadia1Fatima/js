<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>
<body>
    <div class="parent">
        <!-- This is a comment -->
        <div class="day">Monday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
    </div>
     <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    const parent = document.querySelector('.parent')
    console.log(parent)
    console.log(parent.children) // gives HTML container which is similar to array
    console.log(parent.children[1].innerHTML)
    for (let i = 0; i < parent.children.length; i++) { //parent.children.length means length of HTML container containing all children
        console.log(parent.children[i].innerHTML)
    }
    parent.children[1].style.color = "orange"
    console.log(parent.firstElementChild)
    console.log(parent.lastElementChild)
    const dayOne = document.querySelector('.day')
    console.log(dayOne)
    console.log(dayOne.parentElement)
    console.log(dayOne.nextElementSibling)
    console.log("NODES: ", parent.childNodes)

    const div = document.createElement('div')
    console.log(div)
    div.className = "main"
    div.id = Math.round(Math.random() * 10 + 1)
    div.setAttribute("title", "generated title")
    div.style.backgroundColor = "green"
    div.style.padding = "12px"
    const addText = document.createTextNode("HELLO WORLD!!")
    div.appendChild(addText)
    document.body.appendChild(div)

    function addLanguage(langName){
        const li = document.createElement('li');
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("Python")
    addLanguage("JavaScript")
    //optimized approach
    function addOptiLanguage(langName){
        const li = document.createElement('li');
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage('Swift')

    //Edit
    const secondLang = document.querySelector("li:nth-child(2)")
    console.log(secondLang);
    secondLang.innerHTML = "C#"
    const newli = document.createElement('li')
    newli.textContent = "C++"
    secondLang.replaceWith(newli)
    const firstLang = document.querySelector("li:first-child")
    firstLang.outerHTML = '<li>Ruby</li>'

    //remove
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()
</script>
</html>
