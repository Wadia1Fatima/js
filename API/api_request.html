<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Hello World <3 </h1>
</body>
<script>
    const requestUrl = 'https://api.github.com/users/Wadia1Fatima'
    const xhr = new XMLHttpRequest(); //0 state
    xhr.open('GET', requestUrl) // 1 state
    xhr.onreadystatechange = function(){ // function used to constantly track the changing state
        console.log(xhr.readyState);
        if (xhr.readyState === 4) {
            const data = JSON.parse(this.responseText) // data from api comes in String format we have to convert it into JSON
            console.log(typeof data); // object
            console.log(data.followers_url);
        }
    }
    xhr.send();
</script>
</html>
For API
    0	UNSENT	Client has been created. open() not called yet.
    1	OPENED	open() has been called.
    2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
    3	LOADING	Downloading; responseText holds partial data.
    4	DONE	The operation is complete.
